name: Build Linux

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: linux-port
        type: choice
        options:
          - linux-port
          - master

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout LiveSplit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          submodules: recursive

      - name: Set up .NET environment
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo registry + Rust target dirs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            lib/livesplit-core
            components/LiveSplit.AutoSplittingRuntime/src/asr-capi

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Install linuxdeploy (AppImage tooling)
        run: |
          set -euo pipefail
          url="https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          curl --fail --silent --show-error --location \
               --retry 5 --retry-delay 5 --retry-all-errors \
               -o /tmp/linuxdeploy "$url"
          if ! head -c 4 /tmp/linuxdeploy | od -An -c | grep -q 'E   L   F'; then
            echo "::error::downloaded linuxdeploy is not an ELF binary; first bytes:"
            head -c 200 /tmp/linuxdeploy
            exit 1
          fi
          chmod +x /tmp/linuxdeploy
          sudo mv /tmp/linuxdeploy /usr/local/bin/linuxdeploy
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> "$GITHUB_ENV"

      - name: Package tarball + AppImage
        run: bash scripts/package-linux.sh --appimage

      - name: Stash dist for the release job
        uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          path: |
            dist/livesplit-linux-x64.tar.gz
            dist/LiveSplit.AppImage
          retention-days: 1
          if-no-files-found: error

  build-flatpak:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout LiveSplit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          submodules: recursive

      - name: Cache flatpak system runtimes
        uses: actions/cache@v4
        with:
          path: ~/.local/share/flatpak-system
          key: flatpak-runtimes-${{ hashFiles('org.livesplit.LiveSplit.yml') }}
          restore-keys: flatpak-runtimes-

      - name: Install flatpak-builder + runtimes
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends flatpak flatpak-builder
          # Bridge /var/lib/flatpak to the cached user-owned path (see comment above).
          mkdir -p "$HOME/.local/share/flatpak-system"
          sudo rm -rf /var/lib/flatpak
          sudo ln -s "$HOME/.local/share/flatpak-system" /var/lib/flatpak
          # Idempotent: a warm cache makes this near-instant.
          flatpak remote-add --system --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --system -y --noninteractive flathub \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08 \
            org.freedesktop.Sdk.Extension.dotnet8//24.08 \
            org.freedesktop.Sdk.Extension.rust-stable//24.08

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: LiveSplit.flatpak
          manifest-path: org.livesplit.LiveSplit.yml
          # Content-addressed cache key — hits whenever Cargo.lock files and the
          # manifest are unchanged, so the inner Rust + dotnet builds reuse state.
          cache-key: flatpak-builder-${{ hashFiles('**/Cargo.lock', 'org.livesplit.LiveSplit.yml') }}

      - name: Stash bundle for the release job
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: LiveSplit.flatpak
          retention-days: 1
          if-no-files-found: error

  release:
    needs: [build-linux, build-flatpak]
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout LiveSplit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-dist
          path: dist

      - name: Download Flatpak bundle
        uses: actions/download-artifact@v4
        with:
          name: linux-flatpak
          path: .

      - name: Compute release tag
        id: tag
        run: |
          set -euo pipefail
          git fetch --tags --quiet
          date_tag="v$(date -u +%Y-%m-%d)"
          if ! git rev-parse -q --verify "refs/tags/${date_tag}" >/dev/null; then
            tag="${date_tag}"
          else
            n=1
            while git rev-parse -q --verify "refs/tags/${date_tag}-${n}" >/dev/null; do
              n=$((n+1))
            done
            tag="${date_tag}-${n}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Selected release tag: ${tag}"

      - name: Diagnose release-token permissions
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set +e
          echo "::group::gh auth status"
          gh auth status
          echo "::endgroup::"
          echo "::group::repo metadata visible to token"
          gh api "/repos/${{ github.repository }}" --jq '{full_name, fork, private, default_branch, permissions}'
          echo "::endgroup::"
          echo "::group::list releases (needs contents:read)"
          gh api "/repos/${{ github.repository }}/releases" --jq 'length' && echo "  read OK" || echo "  read FAILED"
          echo "::endgroup::"
          echo "::group::tag protection rules (block tag creation -> 403)"
          gh api "/repos/${{ github.repository }}/tags/protection" 2>&1 || echo "  (none, or endpoint inaccessible)"
          echo "::endgroup::"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          commit="$(git rev-parse HEAD)"
          gh release create "${tag}" \
            --title "${tag}" \
            --target "${commit}" \
            --notes "Automated build of \`${{ inputs.branch }}\` at ${commit}." \
            dist/livesplit-linux-x64.tar.gz \
            dist/LiveSplit.AppImage \
            LiveSplit.flatpak
