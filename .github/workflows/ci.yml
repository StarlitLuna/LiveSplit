name: Build Linux

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: linux-port
        type: choice
        options:
          - linux-port
          - master

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    needs: []
    permissions:
      contents: write

    steps:
      - name: Checkout LiveSplit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          submodules: recursive

      - name: Set up .NET environment
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build liblivesplit_core.so (linux-x64)
        run: bash scripts/build-native-linux.sh linux-x64

      - name: Build LiveSplit (linux-x64)
        run: >
          dotnet build
          -v m
          -c Release
          ./LiveSplit.sln

      - name: Smoke-test LiveSplit binary starts
        run: |
          # Confirm the binary loads enough to print --version without X server
          timeout 10s dotnet ./bin/release/LiveSplit.dll --version || echo "exit=$?"

      - name: Upload linux-x64 build as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiveSplit_Linux_x64
          path: ./bin/release

      - name: Install linuxdeploy (AppImage tooling)
        run: |
          set -euo pipefail
          url="https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          curl --fail --silent --show-error --location \
               --retry 5 --retry-delay 5 --retry-all-errors \
               -o /tmp/linuxdeploy "$url"
          if ! head -c 4 /tmp/linuxdeploy | od -An -c | grep -q 'E   L   F'; then
            echo "::error::downloaded linuxdeploy is not an ELF binary; first bytes:"
            head -c 200 /tmp/linuxdeploy
            exit 1
          fi
          chmod +x /tmp/linuxdeploy
          sudo mv /tmp/linuxdeploy /usr/local/bin/linuxdeploy
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> "$GITHUB_ENV"

      - name: Package tarball + AppImage
        run: bash scripts/package-linux.sh --appimage

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiveSplit_Linux_Tarball
          path: dist/livesplit-linux-x64.tar.gz

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiveSplit_Linux_AppImage
          path: dist/LiveSplit-*.AppImage

      - name: Install flatpak-builder
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y --system --noninteractive flathub \
            org.freedesktop.Platform//23.08 \
            org.freedesktop.Sdk//23.08 \
            org.freedesktop.Sdk.Extension.dotnet8//23.08 \
            org.freedesktop.Sdk.Extension.rust-stable//23.08

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: livesplit.flatpak
          manifest-path: org.livesplit.LiveSplit.yml
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Compute release tag
        id: tag
        run: |
          set -euo pipefail
          git fetch --tags --quiet
          date_tag="v$(date -u +%Y-%m-%d)"
          if ! git rev-parse -q --verify "refs/tags/${date_tag}" >/dev/null; then
            tag="${date_tag}"
          else
            n=1
            while git rev-parse -q --verify "refs/tags/${date_tag}-${n}" >/dev/null; do
              n=$((n+1))
            done
            tag="${date_tag}-${n}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Selected release tag: ${tag}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          commit="$(git rev-parse HEAD)"
          gh release create "${tag}" \
            --title "${tag}" \
            --target "${commit}" \
            --notes "Automated build of \`${{ inputs.branch }}\` at ${commit}." \
            dist/livesplit-linux-x64.tar.gz \
            dist/LiveSplit-*.AppImage \
            livesplit.flatpak
