name: Build Packages

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: linux-port
        type: string

jobs:
  build-windows:
    runs-on: windows-2022
    permissions:
      contents: read

    steps:
      - name: Checkout LiveSplit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Set up .NET environment
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props', 'NuGet.Config') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore LiveSplit.sln --verbosity minimal

      - name: Build
        run: dotnet build LiveSplit.sln --no-restore --configuration Release --verbosity minimal -m:1

      - name: Test
        run: dotnet test LiveSplit.sln --no-build --no-restore --configuration Release --verbosity minimal -m:1

      - name: Publish Windows package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force dist | Out-Null
          dotnet publish src/LiveSplit/LiveSplit.csproj `
            --no-restore `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:DebugType=None `
            -p:BuildPath="$PWD/artifacts/windows-build" `
            -o "$PWD/dist/LiveSplit-win-x64"
          Compress-Archive -Path "$PWD/dist/LiveSplit-win-x64/*" -DestinationPath "$PWD/dist/LiveSplit-win-x64.zip" -Force

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: dist/LiveSplit-win-x64.zip
          retention-days: 1
          if-no-files-found: error

  build-flatpak:
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    permissions:
      contents: read

    steps:
      - name: Checkout LiveSplit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: LiveSplit.flatpak
          manifest-path: org.livesplit.LiveSplit.yml
          cache-key: flatpak-builder-${{ hashFiles('**/Cargo.lock', 'org.livesplit.LiveSplit.yml') }}

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: LiveSplit.flatpak
          retention-days: 1
          if-no-files-found: error

  build-fedora-rpm:
    runs-on: ubuntu-22.04
    container:
      image: fedora:latest
    defaults:
      run:
        shell: bash
    permissions:
      contents: read

    steps:
      - name: Install GitHub Actions runtime dependencies
        run: |
          set -euo pipefail
          dnf install -y git tar gzip

      - name: Checkout LiveSplit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Install Fedora build dependencies
        run: |
          set -euo pipefail
          dnf install -y \
            @development-tools \
            dotnet-sdk-8.0 \
            cargo \
            rpm-build \
            rpmdevtools \
            desktop-file-utils \
            pkgconf-pkg-config \
            vlc-devel \
            vlc-libs \
            vlc-plugin-ffmpeg \
            git \
            tar \
            gzip

      - name: Cache Cargo registry + Rust target dirs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            lib/livesplit-core
            components/LiveSplit.AutoSplittingRuntime/src/asr-capi

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-fedora-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props', 'NuGet.Config') }}
          restore-keys: nuget-fedora-

      - name: Build Fedora RPM
        run: |
          set -euo pipefail
          chmod +x scripts/build-native-linux.sh scripts/package-fedora-rpm.sh
          RPM_VERSION="0.0.$GITHUB_RUN_NUMBER" RPM_RELEASE=1 bash scripts/package-fedora-rpm.sh

      - name: Upload Fedora RPM
        uses: actions/upload-artifact@v4
        with:
          name: fedora-rpm
          path: dist/rpm/*.rpm
          retention-days: 1
          if-no-files-found: error

  release:
    needs: [build-windows, build-flatpak, build-fedora-rpm]
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout LiveSplit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Download Windows package
        uses: actions/download-artifact@v4
        with:
          name: windows-dist
          path: dist

      - name: Download Flatpak bundle
        uses: actions/download-artifact@v4
        with:
          name: linux-flatpak
          path: dist

      - name: Download Fedora RPM
        uses: actions/download-artifact@v4
        with:
          name: fedora-rpm
          path: dist/rpm

      - name: Compute release tag
        id: tag
        run: |
          set -euo pipefail
          git fetch --tags --quiet
          date_tag="v$(date -u +%Y-%m-%d)"
          if ! git rev-parse -q --verify "refs/tags/${date_tag}" >/dev/null; then
            tag="${date_tag}"
          else
            n=1
            while git rev-parse -q --verify "refs/tags/${date_tag}-${n}" >/dev/null; do
              n=$((n+1))
            done
            tag="${date_tag}-${n}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Selected release tag: ${tag}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          commit="$(git rev-parse HEAD)"
          gh release create "${tag}" \
            --title "${tag}" \
            --target "${commit}" \
            --notes "Automated build of \`${{ inputs.branch }}\` at ${commit}." \
            dist/LiveSplit-win-x64.zip \
            dist/LiveSplit.flatpak \
            dist/rpm/*.rpm
