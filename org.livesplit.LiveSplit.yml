app-id: org.livesplit.LiveSplit
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.dotnet8
  - org.freedesktop.Sdk.Extension.rust-stable
command: LiveSplit
finish-args:
  - --share=ipc
  - --share=network            # speedrun.com / update checks
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home          # so users can save splits/layouts wherever
  # Autosplitter support: --allow=devel lifts the seccomp filter that blocks
  # ptrace / process_vm_readv against host processes. Without it, every attempt
  # to read game memory (ASL or WASM) silently fails with EPERM. The host
  # kernel still enforces yama ptrace_scope on top of this; see the README for
  # the sysctl drop-in users need on Ubuntu/Fedora.
  - --allow=devel
  # Steam keeps its libraries under XDG_DATA_HOME, but Proton prefixes for
  # games installed to a secondary library (e.g. /mnt/games) live outside
  # $HOME. Without filesystem visibility we can't resolve the PE paths Wine
  # reports in /proc/<pid>/maps, which breaks module-name lookups.
  - --filesystem=xdg-data/Steam:ro
  - --filesystem=/run/media:ro
modules:
  - name: livesplit
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/dotnet8/bin:/usr/lib/sdk/rust-stable/bin
      build-args:
        - --share=network      # cargo + dotnet restore need to fetch packages
      env:
        DOTNET_CLI_TELEMETRY_OPTOUT: '1'
        DOTNET_NOLOGO: '1'
      no-debuginfo: true
    build-commands:
      # Build liblivesplit_core.so + libasr_capi.so into the .NET runtimes/ layout.
      - bash scripts/build-native-linux.sh linux-x64

      # Self-contained .NET publish for linux-x64.
      - dotnet publish src/LiveSplit/LiveSplit.csproj
          -c Release -r linux-x64 --self-contained true
          -p:PublishSingleFile=false -p:DebugType=None -o publish

      # Stage into the Flatpak prefix.
      - mkdir -p /app/bin
      - cp -r publish/. /app/bin/
      - install -Dm644 res/Icon.png /app/share/icons/hicolor/256x256/apps/org.livesplit.LiveSplit.png
      - install -Dm644 org.livesplit.LiveSplit.desktop /app/share/applications/org.livesplit.LiveSplit.desktop
    sources:
      - type: dir
        path: .
