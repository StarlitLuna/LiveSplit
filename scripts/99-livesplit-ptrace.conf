# Allow LiveSplit autosplitters to read other processes' memory via
# process_vm_readv / /proc/<pid>/mem. Default on most distros is 1, which
# only permits parent->child ptrace; speedrun targets are usually launched
# by Steam, not by LiveSplit, so they're siblings.
#
# Install:
#   sudo cp scripts/99-livesplit-ptrace.conf /etc/sysctl.d/
#   sudo sysctl --system
kernel.yama.ptrace_scope = 0
